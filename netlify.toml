[build]
  command = "bash netlify-build.sh"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "3.41.9"

# 反向代理 Pub 搜索 API（pub.dev 搜索无 CORS 头）
[[redirects]]
  from = "/api/pubdev/*"
  to = "https://pub.dev/:splat"
  status = 200
  force = true

# SPA 路由重定向（放最后）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
