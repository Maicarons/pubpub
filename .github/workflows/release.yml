name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build windows

      - name: 打包
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pubpub-windows.zip

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-windows
          path: pubpub-windows.zip

  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装 Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建 APK
        run: flutter build apk --split-per-abi

      - name: 构建 App Bundle
        run: flutter build appbundle

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-android-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: 上传 AAB
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-android-aab
          path: build/app/outputs/bundle/release/*.aab

  build-web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build web --release

      - name: 打包
        run: cd build/web && zip -r ../../pubpub-web.zip . && cd ../..

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-web
          path: pubpub-web.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build linux

      - name: 打包
        run: cd build/linux/x64/release/bundle && tar -czf ../../../../../pubpub-linux.tar.gz . && cd ../../../../..

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-linux
          path: pubpub-linux.tar.gz

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build macos

      - name: 打包
        run: cd build/macos/Build/Products/Release && zip -r ../../../../../pubpub-macos.zip . && cd ../../../../..

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-macos
          path: pubpub-macos.zip

  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android, build-web, build-linux, build-macos]
    permissions:
      contents: write
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4

      - name: 列出文件
        run: find . -type f -name "*.zip" -o -name "*.apk" -o -name "*.aab" -o -name "*.tar.gz" 2>/dev/null

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pubpub-windows/pubpub-windows.zip
            pubpub-android-apk/*.apk
            pubpub-android-aab/*.aab
            pubpub-web/pubpub-web.zip
            pubpub-linux/pubpub-linux.tar.gz
            pubpub-macos/pubpub-macos.zip
          generate_release_notes: true
