name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: 构建发布版
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_cmd: flutter build windows
            artifact_path: build/windows/x64/runner/Release/
            artifact_name: pubpub-windows
          - os: ubuntu-latest
            build_cmd: flutter build web
            artifact_path: build/web/
            artifact_name: pubpub-web

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: ${{ matrix.build_cmd }}

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4

      - name: 打包 Windows
        run: |
          cd pubpub-windows
          zip -r ../pubpub-windows.zip .
          cd ..

      - name: 打包 Web
        run: |
          cd pubpub-web
          zip -r ../pubpub-web.zip .
          cd ..

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pubpub-windows.zip
            pubpublic-web.zip
          generate_release_notes: true
