name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: 静态分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 静态分析
        run: flutter analyze

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 运行测试
        run: flutter test

  build-windows:
    name: Windows
    runs-on: windows-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build windows

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-windows
          path: build/windows/x64/runner/Release/

  build-android:
    name: Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装 Android SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建 APK
        run: flutter build apk --split-per-abi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-android
          path: build/app/outputs/flutter-apk/*.apk

  build-web:
    name: Web
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build web --release

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-web
          path: build/web/

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build linux

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-linux
          path: build/linux/x64/release/bundle/

  build-macos:
    name: macOS
    runs-on: macos-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 生成代码
        run: flutter pub run build_runner build

      - name: 构建
        run: flutter build macos

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: pubpub-macos
          path: build/macos/Build/Products/Release/
